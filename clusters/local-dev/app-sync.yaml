apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: python-app-source
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/jesteban19/gitops-flux-testing
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: python-app-delivery
  namespace: flux-system
spec:
  interval: 5m
  path: "./apps/python-ms" # Aquí es donde Flux buscará tu app
  prune: true # Si borras el archivo en Git, Flux lo borra del clúster
  sourceRef:
    kind: GitRepository
    name: python-app-source
